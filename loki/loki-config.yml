auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  # Increased log sizes for the HTTP server to accept large payloads
  grpc_server_max_recv_msg_size: 104857600  # 100MB
  grpc_server_max_send_msg_size: 104857600  # 100MB

common:
  path_prefix: /var/lib/loki
  storage:
    filesystem:
      chunks_directory: /var/lib/loki/chunks
      rules_directory: /var/lib/loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2025-12-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Compactor is required for TSDB and for cleaning up old logs (Retention)
compactor:
  working_directory: /var/lib/loki/compactor
  delete_request_store: filesystem
  compaction_interval: 60m
  retention_enabled: true
  retention_delete_delay: 48h
  retention_delete_worker_count: 100

ruler:
  alertmanager_url: http://localhost:9093

limits_config:
  #retention_period: 720h  # 1 month
  retention_period: 4320h  # 6 months

  # --- INGESTION LIMITS ---
  # These allow high throughput for "big logs"
  per_stream_rate_limit: 100M
  per_stream_rate_limit_burst: 200M
  ingestion_burst_size_mb: 200
  ingestion_rate_mb: 100
  
  # --- QUERY LIMITS ---
  max_entries_limit_per_query: 1000000
  query_timeout: 1m
  
  # --- LABEL LIMITS ---
  cardinality_limit: 200000
  max_label_names_per_series: 300
  
  # Avoid putting log content in Labels. 
  # If you need to attach metadata that isn't for searching/indexing,
  # use 'structured_metadata' instead of huge labels.
  max_label_value_length: 20480 
  max_label_name_length: 1024
  
  # Enable Structured Metadata (Loki 3.0+)
  # This allows you to attach data to logs without bloating the index.
  allow_structured_metadata: true

analytics:
  reporting_enabled: false
