apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    # Use the docker service name and port
    url: http://loki:3100
    isDefault: true
    version: 1
    editable: true
    jsonData:
      # This matches the 'query_timeout: 1m' we set in Loki
      timeout: 60
      # Maximum lines to return in one query
      maxLines: 1000
